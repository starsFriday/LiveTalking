###############################################################################
#  LiveTalking Configuration
#  CLI arguments override values in this file
###############################################################################

# -------- Audio ----------------------------------------------------------
l: 10
m: 8
r: 10

# -------- Avatar Model ----------------------------------------------------------
model: wav2lip                 # musetalk / wav2lip / ultralight
avatar_id: wav2lip256_avatar1
batch_size: 8                  # lower mouth-animation latency for realtime speech

# -------- Custom Actions ----------------------------------------------------------
customvideo_config: ''

# -------- TTS ----------------------------------------------------------
tts: edgetts                   # keep original text/LLM driving; MiniCPM audio uses the direct bridge
REF_FILE: ''                   # voice name or reference audio file path (wav, 16kHz, mono)
REF_TEXT: ''                   # reference text for voice cloning (English or Chinese)
TTS_SERVER: ''                 # TTS server URL, no trailing slash

# -------- MiniCPM-o 4.5 realtime conversation -------------------------------
minicpmo_enabled: true
minicpmo_url: 'ws://127.0.0.1:8006/v1/realtime?mode=video'
minicpmo_worker_health_url: 'http://127.0.0.1:22400/health'
minicpmo_model_path: 'models/MiniCPM-o-4_5'
minicpmo_system_prompt: '你是一个自然、友好的语音助手，请简洁、完整地回答用户。'
minicpmo_input_chunk_ms: 1000
minicpmo_max_response_seconds: 120
minicpmo_barge_in_enabled: true
minicpmo_barge_in_threshold_db: -34
minicpmo_barge_in_trigger_ms: 280
minicpmo_barge_in_cooldown_ms: 1500
minicpmo_barge_in_start_guard_ms: 400
assistant_timezone: 'Asia/Shanghai'
web_search_enabled: true
gemini_search_model: 'gemini-3.1-flash-lite'
web_search_max_context_chars: 320
web_search_timeout_seconds: 12

# -------- Transport ----------------------------------------------------------
transport: webrtc              # rtcpush / webrtc / rtmp / virtualcam
stun: 'stun:stun.freeswitch.org:3478'
turn_url: 'turn:127.0.0.1:3478?transport=tcp'
turn_username: 'livetalking'
turn_credential: 'CHANGE_ME_TURN_CREDENTIAL'
push_url: ''                   # push URL for rtcpush/rtmp (not needed for webrtc/virtualcam)
max_session: 5                 # max concurrent sessions
listenport: 8010
