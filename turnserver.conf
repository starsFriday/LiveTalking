# Local TURN relay for LiveTalking over a VS Code / SSH TCP port forward.
listening-port=3478
listening-ip=0.0.0.0
min-port=49160
max-port=49200
fingerprint
lt-cred-mech
realm=livetalking.local
user=livetalking:CHANGE_ME_TURN_CREDENTIAL
no-udp
no-tls
no-dtls
no-multicast-peers
stale-nonce=600
# Browsers may temporarily keep several TCP allocations while reconnecting.
# The old 12-allocation limit was easily exhausted after repeated retries.
user-quota=64
total-quota=128
max-allocate-lifetime=300
no-cli
pidfile=/root/autodl-tmp/tangfan/code/LiveTalking/logs/turnserver.pid
log-file=/root/autodl-tmp/tangfan/code/LiveTalking/logs/turnserver.log
